name: CI/CD

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # ─────────────────────────────────────────────
  # CI — runs on every push and every pull request
  # ─────────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d auth_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/auth_db?sslmode=disable
      JWT_SECRET: super_secret_key_123_must_be_32_bytes_long_minimum
      AUTO_RUN_MIGRATIONS: "true"
      AUTO_RUN_SEEDS: "true"
      ADMIN_EMAIL: admin@mail.com
      ADMIN_PASSWORD: admin123
      AI_ENABLED: "false"
      PORT: "8080"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Download dependencies
        run: go mod download

      - name: Verify go.sum is tidy
        run: |
          go mod tidy
          git diff --exit-code go.sum

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Migration smoke check
        env:
          PGPASSWORD: password
          MIGRATION_DATABASE_URL: postgresql://postgres:password@localhost:5432/auth_db_migration_smoke?sslmode=disable
        run: |
          psql -h localhost -U postgres -d postgres -c "DROP DATABASE IF EXISTS auth_db_migration_smoke;"
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE auth_db_migration_smoke;"
          DATABASE_URL="$MIGRATION_DATABASE_URL" go run ./cmd/migrate
          DATABASE_URL="$MIGRATION_DATABASE_URL" go run ./cmd/migrate

      - name: Run tests (with race detector)
        run: go test -race -count=1 ./...

      - name: Install Newman dependencies
        run: npm ci

      - name: Start API server
        run: |
          nohup go run ./cmd/api > /tmp/pleco-api.log 2>&1 &

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Run Newman smoke and negative suites
        run: npm run postman:all

      - name: Show API logs on failure
        if: failure()
        run: |
          echo "===== /tmp/pleco-api.log ====="
          if [ -f /tmp/pleco-api.log ]; then
            cat /tmp/pleco-api.log
          else
            echo "No API log file found at /tmp/pleco-api.log"
          fi
  
