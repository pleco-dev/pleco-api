services:
  app:
    image: ${PLECO_API_IMAGE:-pleco-api:latest}
    build: .
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
