openapi: 3.0.3
info:
  title: Pleco API
  version: 1.0.0
  description: |
    OpenAPI reference for pleco-api.

    Most API responses use a standard envelope:
    - success: `status`, `message`, optional `data`, optional `meta`
    - error: `status`, `message`, optional `errors`
servers:
  - url: http://localhost:8080
    description: Local development
  - url: http://localhost
    description: Docker Compose gateway
  - url: https://pleco-api.onrender.com
    description: Production
tags:
  - name: Health
  - name: Auth
  - name: User
  - name: Role
  - name: Permission
  - name: Audit
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check (Legacy)
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeHealth'

  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeHealth'

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready and database is connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeHealth'
        '503':
          description: Service is not ready or database is disconnected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      parameters:
        - in: header
          name: X-Device-ID
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          headers:
            Set-Cookie:
              description: HttpOnly refresh-token cookie named `pleco_refresh_token`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAccessToken'
        '401':
          description: Invalid credentials or unverified email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
    patch:
      tags: [User]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'

  /auth/change-password:
    patch:
      tags: [User]
      summary: Change current user password
      description: Revokes all stored refresh tokens for the user. Previously issued access tokens may be rejected immediately on protected routes.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'

  /auth/verify:
    get:
      tags: [Auth]
      summary: Verify an email address with a verification token
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '400':
          description: Missing or invalid verification token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend an email verification link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: Verification email resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: Reset link sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset a password with a reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token and rotate refresh cookie
      description: Browser clients should send the `pleco_refresh_token` HttpOnly cookie. The JSON body is retained as a legacy fallback for non-browser clients.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refresh success
          headers:
            Set-Cookie:
              description: Rotated HttpOnly refresh-token cookie named `pleco_refresh_token`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAccessToken'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current device
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '400':
          description: Missing device id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke all active sessions for the current user
      description: Revokes all refresh-token-backed sessions and invalidates previously issued access tokens for subsequent protected requests.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'

  /auth/logout-others:
    post:
      tags: [Auth]
      summary: Revoke all active sessions except the current device
      description: Keeps the current device session, revokes refresh-token-backed sessions on other devices, rotates the refresh cookie, and returns a fresh access token.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Other sessions revoked and current device refresh cookie rotated
          headers:
            Set-Cookie:
              description: Rotated HttpOnly refresh-token cookie named `pleco_refresh_token`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAccessToken'
        '400':
          description: Missing device id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/sessions:
    get:
      tags: [Auth]
      summary: List active sessions for the current user
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Device-ID
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Sessions fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSessions'

  /auth/sessions/{id}:
    delete:
      tags: [Auth]
      summary: Revoke a specific active session
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/social-login:
    post:
      tags: [Auth]
      summary: Login or register using a social identity provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialLoginRequest'
      responses:
        '200':
          description: Social login success
          headers:
            Set-Cookie:
              description: HttpOnly refresh-token cookie named `pleco_refresh_token`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAccessToken'
        '400':
          description: Invalid token, unsupported provider, or missing provider configuration
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'

  /auth/social/{provider}/account:
    get:
      tags: [Auth]
      summary: Get the current user's linked social account for a provider
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [google, facebook, apple]
      responses:
        '200':
          description: Social account fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSocialAccount'
        '400':
          description: Unsupported provider or bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
        '404':
          description: Social account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/admin/roles:
    get:
      tags: [Role]
      summary: List all roles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Roles fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeRoles'

  /auth/admin/roles/{id}:
    get:
      tags: [Role]
      summary: Get a role by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: Role fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeRole'
        '400':
          description: Invalid role id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/admin/permissions:
    get:
      tags: [Permission]
      summary: List all permissions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Permissions fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePermissions'

  /auth/admin/roles/{id}/permissions:
    get:
      tags: [Role]
      summary: Get a role with its permission list
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: Role permissions fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeRolePermissions'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
    put:
      tags: [Role]
      summary: Replace the permission set for a role
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRolePermissionsRequest'
      responses:
        '200':
          description: Role permissions updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeRolePermissions'
        '400':
          description: Invalid permissions
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/admin/users:
    get:
      tags: [User]
      summary: Get paginated users
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: role
          schema:
            type: string
      responses:
        '200':
          description: Users fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUsers'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
    post:
      tags: [User]
      summary: Create user as admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/admin/users/{id}:
    parameters:
      - $ref: '#/components/parameters/UserID'
    get:
      tags: [User]
      summary: Get user by id
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
        '400':
          description: Invalid user id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
    put:
      tags: [User]
      summary: Update user as admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'
    delete:
      tags: [User]
      summary: Delete user as admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '400':
          description: Invalid user id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/admin/users/{id}/permissions:
    get:
      tags: [User]
      summary: Get a user's effective permissions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: User permissions fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUserPermissions'
        '400':
          description: Invalid user id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/admin/audit-logs:
    get:
      tags: [Audit]
      summary: Get paginated audit logs
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: resource
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: actor_user_id
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: date_from
          schema:
            type: string
            format: date-time
        - in: query
          name: date_to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Audit logs fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAuditLogs'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/admin/audit-logs/export:
    get:
      tags: [Audit]
      summary: Export audit logs as CSV
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: resource
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: actor_user_id
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: date_from
          schema:
            type: string
            format: date-time
        - in: query
          name: date_to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: CSV export of audit logs
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/admin/audit-logs/investigations:
    post:
      tags: [Audit]
      summary: Investigate filtered audit logs with AI
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditInvestigationRequest'
      responses:
        '200':
          description: Audit investigation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAuditInvestigation'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
        '503':
          description: AI investigator is not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

    get:
      tags: [Audit]
      summary: List saved audit investigations
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: resource
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: created_by_user_id
          schema:
            type: integer
        - in: query
          name: ai_provider
          schema:
            type: string
        - in: query
          name: ai_model
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: created_from
          schema:
            type: string
            format: date-time
        - in: query
          name: created_to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Saved audit investigations fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAuditInvestigationHistoryList'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/admin/audit-logs/investigations/{id}:
    get:
      tags: [Audit]
      summary: Get saved audit investigation detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Saved audit investigation fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAuditInvestigationHistory'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserID:
      in: path
      name: id
      required: true
      schema:
        type: integer
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
