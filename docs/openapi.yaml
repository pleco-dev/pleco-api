openapi: 3.0.3
info:
  title: Go API Starterkit API
  version: 1.0.0
  description: |
    OpenAPI reference for go-api-starterkit.

    Most API responses use a standard envelope:
    - success: `status`, `message`, optional `data`, optional `meta`
    - error: `status`, `message`, optional `errors`
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: User
  - name: Audit
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeHealth'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      parameters:
        - in: header
          name: X-Device-ID
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAuthTokens'
        '401':
          description: Invalid credentials or unverified email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
    patch:
      tags: [User]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'

  /auth/change-password:
    patch:
      tags: [User]
      summary: Change current user password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access and refresh token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refresh success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAuthTokens'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current device
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '400':
          description: Missing device id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke all active sessions for the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'

  /auth/logout-others:
    post:
      tags: [Auth]
      summary: Revoke all active sessions except the current device
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Other sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '400':
          description: Missing device id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/sessions:
    get:
      tags: [Auth]
      summary: List active sessions for the current user
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Device-ID
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Sessions fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSessions'

  /auth/sessions/{id}:
    delete:
      tags: [Auth]
      summary: Revoke a specific active session
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/social-login:
    post:
      tags: [Auth]
      summary: Login or register using a social identity provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialLoginRequest'
      responses:
        '200':
          description: Social login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAuthTokens'
        '400':
          description: Invalid token, unsupported provider, or missing provider configuration
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'

  /auth/admin/roles:
    get:
      tags: [User]
      summary: List all roles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Roles fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeRoles'

  /auth/admin/permissions:
    get:
      tags: [User]
      summary: List all permissions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Permissions fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePermissions'

  /auth/admin/roles/{id}/permissions:
    get:
      tags: [User]
      summary: Get a role with its permission list
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: Role permissions fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeRolePermissions'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
    put:
      tags: [User]
      summary: Replace the permission set for a role
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRolePermissionsRequest'
      responses:
        '200':
          description: Role permissions updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeRolePermissions'
        '400':
          description: Invalid permissions
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/admin/users:
    get:
      tags: [User]
      summary: Get paginated users
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: role
          schema:
            type: string
      responses:
        '200':
          description: Users fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUsers'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
    post:
      tags: [User]
      summary: Create user as admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/admin/users/{id}:
    get:
      tags: [User]
      summary: Get user by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: User fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
        '400':
          description: Invalid user id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
    put:
      tags: [User]
      summary: Update user as admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EnvelopeError'
                  - $ref: '#/components/schemas/EnvelopeValidationError'
    delete:
      tags: [User]
      summary: Delete user as admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMessage'
        '400':
          description: Invalid user id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/admin/audit-logs:
    get:
      tags: [Audit]
      summary: Get paginated audit logs
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: resource
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: actor_user_id
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: date_from
          schema:
            type: string
            format: date-time
        - in: query
          name: date_to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Audit logs fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAuditLogs'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

  /auth/admin/audit-logs/export:
    get:
      tags: [Audit]
      summary: Export audit logs as CSV
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: resource
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: actor_user_id
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: date_from
          schema:
            type: string
            format: date-time
        - in: query
          name: date_to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: CSV export of audit logs
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserID:
      in: path
      name: id
      required: true
      schema:
        type: integer
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    SocialLoginRequest:
      type: object
      required: [provider, token]
      properties:
        provider:
          type: string
          enum: [google, facebook, apple]
        token:
          type: string
          description: Google and Apple expect an ID token. Facebook expects a user access token.
        id_token:
          type: string
          description: Legacy alias for token, kept for backward compatibility.
    UpdateProfileRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
    CreateUserRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum: [superadmin, admin, user]
        is_verified:
          type: boolean
    UpdateUserRequest:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [superadmin, admin, user]
        is_verified:
          type: boolean
    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    Session:
      type: object
      properties:
        id:
          type: integer
        device_id:
          type: string
        user_agent:
          type: string
        ip_address:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expired_at:
          type: string
          format: date-time
        is_current:
          type: boolean
    Role:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    Permission:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    UpdateRolePermissionsRequest:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: array
          items:
            type: string
    RolePermissions:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        is_verified:
          type: boolean
    AuditLog:
      type: object
      properties:
        id:
          type: integer
        actor_user_id:
          type: integer
          nullable: true
        action:
          type: string
        resource:
          type: string
        resource_id:
          type: integer
          nullable: true
        status:
          type: string
        description:
          type: string
        ip_address:
          type: string
        user_agent:
          type: string
        created_at:
          type: string
          format: date-time
    FieldError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
    EnvelopeMessage:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
    EnvelopeError:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
    EnvelopeValidationError:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    EnvelopeHealth:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Health check ok
        data:
          type: object
          properties:
            status:
              type: string
              example: ok
    EnvelopeAuthTokens:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          $ref: '#/components/schemas/AuthTokens'
    EnvelopeSessions:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Session'
    EnvelopeRoles:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    EnvelopePermissions:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    EnvelopeRolePermissions:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          $ref: '#/components/schemas/RolePermissions'
    EnvelopeProfile:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
            role:
              type: string
    EnvelopeUser:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          $ref: '#/components/schemas/User'
    EnvelopeUsers:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
    EnvelopeAuditLogs:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            action:
              type: string
            resource:
              type: string
            status:
              type: string
            actor_user_id:
              type: integer
              nullable: true
            search:
              type: string
            date_from:
              type: string
              format: date-time
              nullable: true
            date_to:
              type: string
              format: date-time
              nullable: true
